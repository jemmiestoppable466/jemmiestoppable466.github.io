name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A917DA: ${{ secrets.A917DA }}
          BEF3DE: ${{ secrets.BEF3DE }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A917DA', '')
          bm = os.environ.get('BEF3DE', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 45d346ff968d89cb7fae1bb5ffc5a5cd -->', gm)
          if bm:
              s2 = s2.replace('<!-- ebfc2caa5ea53f1f67aea4fe89d252 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
